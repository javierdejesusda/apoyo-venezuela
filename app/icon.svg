<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Civic mark: a location pin whose interior holds an open hand (palm up),
       conveying "help at this place". Brand blue only — no flag colors. -->

  <!-- Pin outer shape -->
  <path
    d="M16 2C11.029 2 7 6.029 7 11c0 6.418 9 19 9 19s9-12.582 9-19c0-4.971-4.029-9-9-9z"
    fill="#1f47df"
  />

  <!-- Pin inner circle highlight -->
  <circle cx="16" cy="11" r="5.5" fill="#1c2f79" />

  <!-- Open hand / palm silhouette (white, inside the pin circle) -->
  <!-- Three finger tips -->
  <path
    d="M13.5 9.2 C13.5 8.4 14.1 7.8 14.8 8.0
       L14.8 10.6
       C14.4 10.7 13.5 10.5 13.5 9.2z"
    fill="white"
  />
  <path
    d="M15.3 8.8 C15.3 7.8 16.0 7.3 16.7 7.6
       L16.7 10.4
       C16.2 10.5 15.3 10.2 15.3 8.8z"
    fill="white"
  />
  <path
    d="M17.2 9.2 C17.2 8.4 17.8 7.9 18.5 8.2
       L18.5 10.6
       C18.1 10.7 17.2 10.5 17.2 9.2z"
    fill="white"
  />
  <!-- Palm base -->
  <rect x="13.2" y="10.4" width="5.6" height="2.2" rx="1.0" fill="white" />
</svg>
